<template>
    <div class="child-question-container">
        <div class="question-text">{questionText}</div>
        <div class="input-wrapper">
            <template lwc:if={isText}>
                <lightning-input 
                    type="text" 
                    label="Response" 
                    data-id={assTaskId}
                    class="text-input"
                    onchange={handleValueChange}>
                </lightning-input>
            </template>
            <template lwc:if={isCheckbox}>
                <div class={checkboxContainerClass}>
                    <lightning-input 
                        type="checkbox" 
                        label={questionText}
                        variant="label-hidden"
                        checked={checked} 
                        onchange={handleValueChange}
                        class="checkbox-input">
                    </lightning-input>
                    <span class="checkbox-label">{checkboxLabel}</span>
                </div>
            </template>
            <template lwc:if={isNumber}>
                <lightning-input 
                    type="number" 
                    label="Enter a number" 
                    data-id={assTaskId}
                    class="number-input"
                    onchange={handleValueChange}>
                </lightning-input>
            </template>
            <template lwc:if={isDate}>
                <lightning-input 
                    type="date" 
                    label="Select a date" 
                    data-id={assTaskId}
                    class="date-input"
                    onchange={handleValueChange}>
                </lightning-input>
            </template>
        </div>
    </div>
</template>
