<template>
    <div class="slds-var-p-around_medium">
        <!-- VIEW MODE -->
        <template if:true={isViewMode}>
            <lightning-card title="My Profile" icon-name="standard:user">
                <lightning-button label="Edit"  variant="brand" slot="actions" onclick={handleEditClick}></lightning-button>
                <div class="slds-p-horizontal_medium slds-p-vertical_small viewMode">
                    <div class="slds-grid slds-gutters slds-wrap">

                        <!-- Row 1 -->
                        <div class="slds-col slds-size_1-of-3">
                            <div class="custom-label">Full Name</div>
                            <div class="custom-value">{name}</div>
                        </div>
                        <div class="slds-col slds-size_2-of-3">
                                <div class="custom-label">Title</div>
                            <div class="custom-value">{title}</div>
                        </div>

                        <!-- Row 2 -->
                        <div class="slds-col slds-size_1-of-3">
                            <div class="custom-label">Company</div>
                            <div class="custom-value">{company}</div>
                        </div>
                        <div class="slds-col slds-size_2-of-3">
                                <div class="custom-label">Email</div>
                            <div class="custom-value">{email}</div>
                        </div>

                        <!-- Row 3 -->
                        <div class="slds-col slds-size_1-of-3">
                            <div class="custom-label">Phone</div>
                            <div class="custom-value">{phone}</div>
                        </div>
                        <div class="slds-col slds-size_2-of-3">
                            <div class="custom-label">Mobile</div>
                            <div class="custom-value">{mobile}</div>
                        </div>

                          <!-- Row 4 -->
                        <div class="slds-col slds-size_1-of-3">
                            <div class="custom-label">Address</div>
                            <div class="custom-value">{address}</div>
                        </div>
                    </div>
                </div>
            </lightning-card>

        </template>

        <!-- EDIT MODE -->

            <lightning-card title="My Profile" icon-name="standard:user">

                <lightning-record-edit-form

                    onerror={handleError}
                    onsubmit={handleSubmit}
                    class="slds-p-horizontal_medium slds-p-vertical_small">

                    <div class="slds-grid slds-gutters slds-wrap editMode">

                        <!-- Row 1 -->
                        <div class="slds-col slds-size_1-of-3">
                            <lightning-input-field 
                                field-name="Name" 
                                disabled="true">
                            </lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-3">
                            <lightning-input-field 
                                field-name="Title"

                        </div>

                                field-name="Address">
                            </lightning-input-field>
                        </div>
                    </div>
