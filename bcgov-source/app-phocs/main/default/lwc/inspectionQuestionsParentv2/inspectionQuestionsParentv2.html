<template>
    <div class="inspection-container">
        <lightning-card>
            <div slot="title" class="slds-grid slds-grid_vertical-align-center">
                <span>Inspection Form</span>

                <template lwc:if={isDraft}>
                    <span class="slds-badge slds-theme_warning slds-m-left_small">
                        Draft
                    </span>
                </template>
            </div>
            <template lwc:if={showQuestions}>
                <div class="progress-container" slot="actions">
                    <span class="progress-text">{progressText}</span>
                    <div class="progress-bar">
                        <div class="progress-bar-fill" style={progressBarStyle}></div>
                    </div>
                </div>
            </template>

            <div class="slds-p-around_small">
                <template lwc:if={showQuestions}>
                </template>
                <template lwc:else>
                    <lightning-button label={startButtonLabel} variant="brand" onclick={handleStart}></lightning-button>
                </template>
            </div>

            <template lwc:if={showQuestions}>
                <template for:each={groupedQuestions} for:item="taskGroup">
                    <div key={taskGroup.taskDefinitionId} class="category-section">
                        <div class="section-header" data-id={taskGroup.taskDefinitionId} onclick={handleToggleSection} role="button" tabindex="0" onkeydown={handleSectionKeydown}>
                            <div class="slds-grid slds-grid_vertical-align-center slds-grid_align-spread">
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <lightning-button-icon icon-name={taskGroup.iconName} alternative-text="Toggle Section" variant="bare" data-id={taskGroup.taskDefinitionId} class="slds-m-right_xx-small"></lightning-button-icon>
                                    <span class="section-title">{taskGroup.taskDefinitionName}</span>
                                    <span class="section-progress">{taskGroup.progressText}</span>
                                </div>
                                <div class="section-status-indicators">
                                    <template lwc:if={taskGroup.isSaving}>
                                        <div class="section-saving-indicator">
                                            <lightning-spinner alternative-text="Saving" size="x-small"></lightning-spinner>
                                            <span class="section-saving-text">Saving...</span>
                                        </div>
                                    </template>
                                    <template lwc:elseif={taskGroup.hasSaved}>
                                        <div class="section-saved-indicator">
                                            <lightning-icon icon-name="utility:success" size="x-small" variant="success"></lightning-icon>
                                            <span class="section-saved-text">Saved</span>
                                        </div>
                                    </template>
                                    <template lwc:elseif={taskGroup.isComplete}>
                                        <span class="section-complete-badge">Complete</span>
                                    </template>
                                    <template lwc:else>
                                        <span class="section-pending-badge">{taskGroup.pendingCount} pending</span>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <template lwc:if={taskGroup.isExpanded}>
                            <template for:each={taskGroup.parentQuestions} for:item="parent">
                                <div key={parent.assessmentIndicatorDefinitionId} class={parent.questionCardClass} data-question-id={parent.assessmentIndicatorDefinitionId}>
                                    <div class="question-row">
                                        <template lwc:if={parent.showCriticalIcon}>
                                            <lightning-icon icon-name="utility:warning" variant="error" size="x-small" class="critical-icon"></lightning-icon>
                                        </template>
                                        <span class="question-text">{parent.questionText}</span>
                                        <div class="question-controls">
                                            <div class="compliance-button-group">
                                                <button type="button" class={parent.compliantButtonClass} data-definitionid={parent.assessmentIndicatorDefinitionId} data-taskid={parent.assessmentTaskId} data-value="Compliant" onclick={handleAssessmentChange}>Compliant</button>
                                                <button type="button" class={parent.nonCompliantButtonClass} data-definitionid={parent.assessmentIndicatorDefinitionId} data-taskid={parent.assessmentTaskId} data-value="PHOCSNonCompliant" onclick={handleAssessmentChange}>Non Compliant</button>
                                                <button type="button" class={parent.naButtonClass} data-definitionid={parent.assessmentIndicatorDefinitionId} data-taskid={parent.assessmentTaskId} data-value="N/A (Not Applicable)" onclick={handleAssessmentChange}>N/A</button>
                                                <button type="button" class={parent.nsButtonClass} data-definitionid={parent.assessmentIndicatorDefinitionId} data-taskid={parent.assessmentTaskId} data-value="N/S (Not Assessed)" onclick={handleAssessmentChange}>N/S</button>
                                            </div>
                                            <button type="button" class="regulatory-codes-btn" data-value={parent.assessmentIndicatorDefinitionId} onclick={handleViewRegulatoryCodes}>View Codes</button>
                                        </div>
                                    </div>
                                    
                                    <template if:true={parent.showChildren}>
                                        <div class="slds-grid slds-grid_align-center">
                                            <div class="slds-grid slds-gutters">
                                                <div class="slds-col slds-size_1-of-3">
                                                    <lightning-input label="Corrected During Inspection" type="checkbox" checked={parent.correctedDuringInspection} data-definitionid={parent.assessmentIndicatorDefinitionId} data-taskid={parent.assessmentTaskId} onchange={handleCorrectedDuringInspectionChange}></lightning-input>
                                                </div>
                                                <div class="slds-col slds-size_1-of-3">
                                                    <!--<lightning-select label="Priority" value={parent.selectPriority} options={priorityOptions} data-question-id={parent.assessmentIndicatorDefinitionId} onchange={handlePriorityChange}></lightning-select>-->
                                                    <lightning-combobox label="Priority" value={parent.selectPriority} options={priorityOptions} data-definitionid={parent.assessmentIndicatorDefinitionId} data-taskid={parent.assessmentTaskId} onchange={handlePriorityChange}></lightning-combobox>
                                                </div>
                                                <div class="slds-col slds-size_1-of-3">
                                                    <lightning-input label="Compliance Due Date" type="datetime-local" value={parent.preferredDateTime} required ={parent.showChildren} data-definitionid={parent.assessmentIndicatorDefinitionId} data-taskid={parent.assessmentTaskId} data-field ="compduedate" onchange={handleDatetimeChange}> </lightning-input>
                                                </div>
                                            </div>
                                        </div> 
                                    </template>

                                    
                                    <template lwc:if={parent.showChildren}>
                                        <div class="child-questions-container">
                                            <div class="child-questions-header">Select applicable observations</div>
                                            <template for:each={parent.childQuestions} for:item="child">
                                                <div key={child.assessmentIndicatorDefinitionId}>
                                                    <c-inspection-question-childv2 question-text={child.questionText} field-type={child.dataType} ass-task-id={child.assessmentTaskId} assessment-indicator-definition-id={child.assessmentIndicatorDefinitionId} checked={child.checkboxValue} onvaluechange={handleChildValueChange} data-parent-id={parent.assessmentIndicatorDefinitionId}></c-inspection-question-childv2>
                                                </div>
                                            </template>
                                        </div>
                                    </template>

                                    <div class="comments-upload-row">
                                        <div class="comments-container">
                                            <lightning-textarea label="Comments" data-definitionid={parent.assessmentIndicatorDefinitionId} data-taskid={parent.assessmentTaskId} value={parent.comment} onchange={handleCommentChange} placeholder="Additional observations..." class="compact-textarea"></lightning-textarea> 
                                        </div>
                                        <!--<div class="file-upload-container">
                                            <lightning-file-upload label="Attach" name="fileUploader" accept={acceptedFormats} record-id={recordId} onuploadfinished={handleUploadFinished} data-definitionid={parent.assessmentIndicatorDefinitionId} multiple class="compact-upload"></lightning-file-upload>
                                            <template lwc:if={parent.hasAttachments}>
                                                <span class="attached-files-label">{parent.attachmentCount} file(s)</span>
                                            </template>
                                        </div>-->
                                    </div>
                                        <template lwc:if={parent.showChildren}>
                                            <div class="comments-container">
                                                <lightning-textarea label="Corrective Action Description" data-definitionid={parent.assessmentIndicatorDefinitionId} data-taskid={parent.assessmentTaskId} value={parent.actionDescription} onchange={handleCorrectiveActionDescriptionChange} placeholder="Additional action descriptions..." class="compact-textarea"></lightning-textarea>
                                            </div>
                                        </template>
                                </div>
                            </template>
                        </template>
                    </div>
                </template>

                <div class="submit-container slds-grid slds-grid_align-spread">                    
                    <lightning-button label="Review Responses" variant="neutral" onclick={handleShowReview} icon-name="utility:preview"></lightning-button>
                <div class="slds-grid slds-grid_align-end">
                    <lightning-button label="Save for Later" variant="neutral" onclick={handleSaveForLater} disabled={isLoading}></lightning-button>
                    <lightning-button label="Submit Inspection" variant="brand" onclick={handleSubmit} disabled={isSubmitDisabled} class="slds-m-left_small"></lightning-button>
                </div>
                </div>
            </template>

            <template lwc:if={showReviewModal}>
                <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="review-modal-heading" class="slds-modal slds-fade-in-open slds-modal_large">
                    <div class="slds-modal__container">
                        <header class="slds-modal__header">
                            <h2 id="review-modal-heading" class="slds-text-heading_medium">Review Inspection Responses</h2>
                            <button class="slds-button slds-button_icon slds-modal__close" onclick={closeReviewModal} title="Close">
                                <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                                <span class="slds-assistive-text">Close</span>
                            </button>
                        </header>
                        <div class="slds-modal__content slds-p-around_medium modal-content-scrollable">
                            <div class="review-summary">
                                <div class="review-stat"><span class="review-stat-value">{totalQuestions}</span><span class="review-stat-label">Total</span></div>
                                <div class="review-stat review-stat--success"><span class="review-stat-value">{compliantCount}</span><span class="review-stat-label">Compliant</span></div>
                                <div class="review-stat review-stat--error"><span class="review-stat-value">{nonCompliantCount}</span><span class="review-stat-label">Non-Compliant</span></div>
                                <div class="review-stat review-stat--warning"><span class="review-stat-value">{unansweredCount}</span><span class="review-stat-label">Unanswered</span></div>
                            </div>
                            <template for:each={reviewData} for:item="category">
                                <div key={category.categoryId} class="review-category">
                                    <div class="review-category-header">
                                        <span class="review-category-name">{category.categoryName}</span>
                                        <span class={category.progressClass}>{category.answeredCount}/{category.totalCount}</span>
                                    </div>
                                    <template for:each={category.questions} for:item="question">
                                        <div key={question.questionId} class={question.reviewItemClass}>
                                            <div class="review-question-row">
                                                <div class="review-question-content">
                                                    <span class="review-question-text">{question.questionText}</span>
                                                    <div class="review-question-status">
                                                        <lightning-icon icon-name={question.statusIcon} size="xx-small" class={question.statusIconClass}></lightning-icon>
                                                        <span class={question.statusClass}>{question.statusLabel}</span>
                                                    </div>
                                                </div>
                                                <button type="button" class="review-nav-btn" data-questionid={question.questionId} data-categoryid={category.categoryId} onclick={handleNavigateToQuestion} title="Go to question">
                                                    <lightning-icon icon-name="utility:forward" size="xx-small"></lightning-icon>
                                                </button>
                                            </div>
                                            <template lwc:if={question.hasComment}>
                                                <div class="review-question-comment">{question.comment}</div>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                        <footer class="slds-modal__footer slds-grid slds-grid_align-spread">
                            <lightning-button label="Back to Edit" variant="neutral" onclick={closeReviewModal}></lightning-button>
                            <lightning-button label="Submit Inspection" variant="brand" onclick={handleSubmitFromReview} disabled={isSubmitDisabled}></lightning-button>
                        </footer>
                    </div>
                </section>
                <div class="slds-backdrop slds-backdrop_open"></div>
            </template>

            <template lwc:if={isLoading}>
                <div class="loading-overlay">
                    <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                </div>
            </template>
        </lightning-card>

        <template lwc:if={showRegulatoryModal}>
            <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                        <h2 id="modal-heading" class="slds-text-heading_medium">Regulatory Codes</h2>
                        <button class="slds-button slds-button_icon slds-modal__close" onclick={closeRegulatoryModal} title="Close">
                            <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium modal-content-scrollable">
                        <template lwc:if={hasRegulatoryCodes}>
                            <template for:each={regulatoryCodes} for:item="code">
                                <div key={code.regulatoryCodeName} class="modal-code-item">
                                    <div class="slds-text-heading_small">{code.regulatoryCodeName}</div>
                                    <p><strong>Status:</strong> {code.statusText}</p>
                                    <p><strong>Validity:</strong> {code.validityText}</p>
                                </div>
                            </template>
                        </template>
                        <template lwc:else>
                            <p>No regulatory codes are associated with this assessment question.</p>
                        </template>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Close" variant="brand" onclick={closeRegulatoryModal}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
        <template lwc:if={showEndInspectionModal}>
            <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">End Inspection?</h2>
                    </header>

                    <div class="slds-modal__content slds-p-around_medium">
                        <div class="slds-m-bottom_medium">
                            <p>
                                Do you want to complete the inspection?<br />
                                No further edits will be possible once inspection is marked as completed.
                            </p>
                        </div>

                        <lightning-textarea label="Closing Comments" value={closingComments} maxlength="1000" onchange={handleClosingCommentsChange} placeholder="Additional comments..."></lightning-textarea>

                        <template lwc:if={closingCommentsMessage}>
                            <div class="slds-m-top_x-small">
                                <span class={closingCommentsMessageClass}>{closingCommentsMessage}</span>
                            </div>
                        </template>
                    </div>

                    <footer class="slds-modal__footer slds-grid slds-grid_align-spread">
                        <lightning-button label="Go Back" variant="neutral" onclick={handleGoBack}></lightning-button>
                        <lightning-button label="Complete Inspection" variant="brand" onclick={handleCompleteInspection}></lightning-button>
                    </footer>
                </div>
            </section>

            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </div>
</template>
