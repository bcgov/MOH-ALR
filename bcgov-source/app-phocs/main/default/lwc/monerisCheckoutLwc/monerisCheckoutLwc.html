<template>
    <lightning-card title="Moneris Checkout">
        <div class="slds-p-around_medium">
            <lightning-input label="Order No" value={orderNo} onchange={handleOrderChange}></lightning-input>
            <lightning-input label="Amount" type="number" value={amount} onchange={handleAmountChange}></lightning-input>
            <lightning-button label="Pay Now" variant="brand" onclick={startPayment}></lightning-button>
        </div>

        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading Payment Form"></lightning-spinner>
        </template>

        <div lwc:dom="manual" id="monerisContainer"></div>
    </lightning-card>
</template>
