<template>
    <div class="inspection-container">
        <lightning-card title="Inspection Questions">

            <!-- Header Actions -->
            <template lwc:if={showQuestions}>
                <div class="progress-container" slot="actions">
                    <span class="progress-text">{progressText}</span>
                    <div class="progress-bar">
                        <div class="progress-bar-fill" style={progressBarStyle}></div>
                    </div>
                </div>
            </template>

            <!-- Start Button -->
            <div class="slds-p-around_small">
                <template lwc:if={showQuestions}>
                </template>
                <template lwc:else>
                    <lightning-button label="Start Inspection"
                                      variant="brand"
                                      onclick={handleStart}
                                      disabled={isReadOnly}>
                    </lightning-button>
                </template>
            </div>

            <!-- QUESTIONS -->
            <template lwc:if={showQuestions}>
                <template for:each={groupedQuestions} for:item="taskGroup">
                    <div key={taskGroup.taskDefinitionId} class="category-section">

                        <!-- Section Header -->
                        <div class="section-header"
                             data-id={taskGroup.taskDefinitionId}
                             onclick={handleToggleSection}>
                            <div class="slds-grid slds-grid_vertical-align-center slds-grid_align-spread">
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <lightning-button-icon icon-name={taskGroup.iconName}
                                                           alternative-text="Toggle Section"
                                                           variant="bare"
                                                           data-id={taskGroup.taskDefinitionId}
                                                           class="slds-m-right_xx-small">
                                    </lightning-button-icon>
                                    <span class="section-title">{taskGroup.taskDefinitionName}</span>
                                </div>
                                <div>
                                    <template lwc:if={taskGroup.isComplete}>
                                        <span class="slds-badge slds-theme_success">Complete</span>
                                    </template>
                                    <template lwc:else>
                                        <span class="slds-badge slds-theme_warning">{taskGroup.pendingCount} Pending</span>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <!-- Section Body -->
                        <template lwc:if={taskGroup.isExpanded}>
                            <template for:each={taskGroup.parentQuestions} for:item="parent">
                                <div key={parent.assessmentTaskId} class="question-card">

                                    <!-- Question -->
                                    <div class="question-row">
                                        <span class="question-text">{parent.questionText}</span>
                                        <div class="question-controls">
                                            <div class="compliance-button-group">
                                                <button type="button"
                                                        class={parent.compliantButtonClass}
                                                        data-definitionid={parent.assessmentIndicatorDefinitionId}
                                                        data-value="Compliant"
                                                        onclick={handleAssessmentChange}
                                                        disabled={isReadOnly}>
                                                    Compliant
                                                </button>

                                                <button type="button"
                                                        class={parent.nonCompliantButtonClass}
                                                        data-definitionid={parent.assessmentIndicatorDefinitionId}
                                                        data-value="PHOCSNonCompliant"
                                                        onclick={handleAssessmentChange}
                                                        disabled={isReadOnly}>
                                                    Non Compliant
                                                </button>

                                                <button type="button"
                                                        class={parent.naButtonClass}
                                                        data-definitionid={parent.assessmentIndicatorDefinitionId}
                                                        data-value="N/A (Not Applicable)"
                                                        onclick={handleAssessmentChange}
                                                        disabled={isReadOnly}>
                                                    N/A
                                                </button>

                                                <button type="button"
                                                        class={parent.nsButtonClass}
                                                        data-definitionid={parent.assessmentIndicatorDefinitionId}
                                                        data-value="N/S (Not Assessed)"
                                                        onclick={handleAssessmentChange}
                                                        disabled={isReadOnly}>
                                                    N/S
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Inputs -->
                                    <div class="slds-grid slds-gutters slds-m-top_small">
                                        <div class="slds-col slds-size_1-of-3">
                                            <lightning-input label="Corrected During Inspection"
                                                             type="checkbox"
                                                             checked={parent.correctedDuringInspection}
                                                             data-question-id={parent.assessmentIndicatorDefinitionId}
                                                             onchange={handleCorrectedDuringInspectionChange}
                                                             disabled={isReadOnly}>
                                            </lightning-input>
                                        </div>

                                        <div class="slds-col slds-size_1-of-3">
                                            <lightning-combobox label="Priority"
                                                                value={parent.selectPriority}
                                                                options={priorityOptions}
                                                                data-question-id={parent.assessmentIndicatorDefinitionId}
                                                                onchange={handlePriorityChange}
                                                                disabled={isReadOnly}>
                                            </lightning-combobox>
                                        </div>

                                        <div class="slds-col slds-size_1-of-3">
                                            <lightning-input label="Compliance Due Date"
                                                             type="datetime"
                                                             value={parent.preferredDateTime}
                                                             data-question-id={parent.assessmentIndicatorDefinitionId}
                                                             onchange={handleDatetimeChange}
                                                             disabled={isReadOnly}>
                                            </lightning-input>
                                        </div>
                                    </div>

                                    <!-- Comments -->
                                    <div class="slds-m-top_small">
                                        <lightning-textarea label="Comments"
                                                            value={parent.comment}
                                                            data-question-id={parent.assessmentIndicatorDefinitionId}
                                                            onchange={handleCommentChange}
                                                            disabled={isReadOnly}>
                                        </lightning-textarea>
                                    </div>

                                </div>
                            </template>
                        </template>
                    </div>
                </template>

                <!-- ACTION BUTTONS -->
                <div class="submit-container slds-grid slds-grid_align-spread">
                    <lightning-button label="Review Responses"
                                      variant="neutral"
                                      onclick={handleShowReview}>
                    </lightning-button>

                    <lightning-button label="Submit Inspection"
                                      variant="brand"
                                      onclick={handleSubmit}
                                      disabled={isSubmitDisabled}>
                    </lightning-button>

                </div>
            </template>

            <!-- REVIEW MODAL -->
            <template lwc:if={showReviewModal}>
                <section role="dialog" class="slds-modal slds-fade-in-open slds-modal_large">
                    <div class="slds-modal__container">
                        <header class="slds-modal__header">
                            <h2 class="slds-text-heading_medium">Review Inspection Responses</h2>
                            <button class="slds-button slds-button_icon slds-modal__close"
                                    onclick={closeReviewModal}>
                                <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                            </button>
                        </header>

                        <div class="slds-modal__content slds-p-around_medium">
                            <p><strong>Total:</strong> {totalQuestions}</p>
                            <p><strong>Compliant:</strong> {compliantCount}</p>
                            <p><strong>Non-Compliant:</strong> {nonCompliantCount}</p>
                            <p><strong>Unanswered:</strong> {unansweredCount}</p>
                        </div>

                        <footer class="slds-modal__footer slds-grid slds-grid_align-spread">
                            <lightning-button label="Back to Edit"
                                              variant="neutral"
                                              onclick={closeReviewModal}>
                            </lightning-button>
                            <lightning-button label="Submit Inspection"
                                              variant="brand"
                                              onclick={handleSubmitFromReview}
                                              disabled={isSubmitDisabled}>
                            </lightning-button>
                        </footer>
                    </div>
                </section>
                <div class="slds-backdrop slds-backdrop_open"></div>
            </template>

            <!-- CONFIRMATION MODAL -->
            <template lwc:if={showConfirmModal}>
                <section role="dialog" class="slds-modal slds-fade-in-open">
                    <div class="slds-modal__container">
                        <header class="slds-modal__header">
                            <h2 class="slds-text-heading_medium">Confirm Inspection Submission</h2>
                        </header>

                        <div class="slds-modal__content slds-p-around_medium">
                            <p>
                                After issuing the inspection report, you will not be able to make any changes.
                                Are you sure you want to issue the inspection report?
                            </p>
                        </div>

                        <footer class="slds-modal__footer">
                            <lightning-button label="Cancel" onclick={closeConfirmModal}></lightning-button>
                            <lightning-button label="Complete Inspection"
                                              variant="brand"
                                              onclick={handleCompleteInspection}>
                            </lightning-button>
                        </footer>
                    </div>
                </section>
                <div class="slds-backdrop slds-backdrop_open"></div>
            </template>

            <!-- LOADING -->
            <template lwc:if={isLoading}>
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </template>

        </lightning-card>
    </div>
</template>
